name: Build Android APKs

on:
  push:
    branches: [main, develop]
    paths:
      - 'app-phone/**'
      - 'app-tv/**'
      - 'core/**'
      - '*.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-phone:
    name: Build Phone APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}

      - name: Build Phone debug APK
        run: ./gradlew :app-phone:assembleDebug

      - name: Upload Phone APK
        uses: actions/upload-artifact@v4
        with:
          name: watchbuddy-phone-debug
          path: app-phone/build/outputs/apk/debug/*.apk

  build-tv:
    name: Build TV APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}

      - name: Build TV debug APK
        run: ./gradlew :app-tv:assembleDebug

      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: watchbuddy-tv-debug
          path: app-tv/build/outputs/apk/debug/*.apk
