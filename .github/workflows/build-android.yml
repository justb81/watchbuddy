name: Build Android APKs

on:
  push:
    branches: [main, develop]
    paths:
      - 'app-phone/**'
      - 'app-tv/**'
      - 'core/**'
      - '*.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'backend/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-backend:
    name: Backend Tests
    if: "!startsWith(github.head_ref, 'release-please--')"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

  test:
    name: Unit Tests
    if: "!startsWith(github.head_ref, 'release-please--')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        run: ./gradlew test

  build-phone:
    name: Build Phone APK
    needs: test
    if: "!startsWith(github.head_ref, 'release-please--')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Phone debug APK
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app-phone:assembleDebug

      - name: Upload Phone APK
        uses: actions/upload-artifact@v7
        with:
          name: watchbuddy-phone-debug
          path: app-phone/build/outputs/apk/debug/*.apk

  build-tv:
    name: Build TV APK
    needs: test
    if: "!startsWith(github.head_ref, 'release-please--')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build TV debug APK
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app-tv:assembleDebug

      - name: Upload TV APK
        uses: actions/upload-artifact@v7
        with:
          name: watchbuddy-tv-debug
          path: app-tv/build/outputs/apk/debug/*.apk
