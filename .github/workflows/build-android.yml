name: Build Android APKs

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: "!startsWith(github.head_ref, 'release-please--')"
    permissions:
      pull-requests: read
    outputs:
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'app-phone/**'
              - 'app-tv/**'
              - 'core/**'
              - '*.gradle.kts'
              - 'gradle/**'
              - 'gradle.properties'

  test:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        run: ./gradlew test

  build:
    name: Build APKs
    needs: [changes, test]
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Phone and TV debug APKs
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app-phone:assembleDebug :app-tv:assembleDebug

      - name: Upload Phone APK
        uses: actions/upload-artifact@v7
        with:
          name: watchbuddy-phone-debug
          path: app-phone/build/outputs/apk/debug/*.apk

      - name: Upload TV APK
        uses: actions/upload-artifact@v7
        with:
          name: watchbuddy-tv-debug
          path: app-tv/build/outputs/apk/debug/*.apk
