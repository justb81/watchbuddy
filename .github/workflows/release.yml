name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      body: ${{ steps.release.outputs.body }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    name: Build & Publish Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # -- Release-Signing vorbereiten ------------------------------------
      - name: Decode Keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      # -- Check Play Store credentials -----------------------------------
      - name: Check Play Store credentials
        id: play-store
        env:
          GOOGLE_PLAY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GOOGLE_PLAY_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret not set — skipping Play Store upload."
          fi

      # -- Signed release builds (APK + AAB) ------------------------------
      - name: Build signed Phone release (APK + AAB)
        if: steps.keystore.outputs.available == 'true'
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ needs.release-please.outputs.version }}
          VERSION_CODE: ${{ github.run_number }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TOKEN_BACKEND_URL: ${{ secrets.TOKEN_BACKEND_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: ./gradlew :app-phone:assembleRelease :app-phone:bundleRelease

      - name: Build signed TV release (APK + AAB)
        if: steps.keystore.outputs.available == 'true'
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ needs.release-please.outputs.version }}
          VERSION_CODE: ${{ github.run_number }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TOKEN_BACKEND_URL: ${{ secrets.TOKEN_BACKEND_URL }}
        run: ./gradlew :app-tv:assembleRelease :app-tv:bundleRelease

      # -- Signed debug APKs (only when keystore is available) ---------------
      - name: Build debug APKs (signed)
        if: steps.keystore.outputs.available == 'true'
        env:
          VERSION_NAME: ${{ needs.release-please.outputs.version }}
          VERSION_CODE: ${{ github.run_number }}
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TOKEN_BACKEND_URL: ${{ secrets.TOKEN_BACKEND_URL }}
        run: ./gradlew :app-phone:assembleDebug :app-tv:assembleDebug

      # -- Collect release artifacts ---------------------------------------
      - name: Collect release artifacts
        run: |
          mkdir -p release-assets

          # Signed debug APKs (only present when keystore was available)
          for apk in app-phone/build/outputs/apk/debug/*.apk; do
            [ -f "$apk" ] && cp "$apk" "release-assets/watchbuddy-phone-${VERSION}-debug.apk"
          done
          for apk in app-tv/build/outputs/apk/debug/*.apk; do
            [ -f "$apk" ] && cp "$apk" "release-assets/watchbuddy-tv-${VERSION}-debug.apk"
          done

          # Release APKs (when available)
          for apk in app-phone/build/outputs/apk/release/*.apk; do
            [ -f "$apk" ] && cp "$apk" "release-assets/watchbuddy-phone-${VERSION}-release.apk"
          done
          for apk in app-tv/build/outputs/apk/release/*.apk; do
            [ -f "$apk" ] && cp "$apk" "release-assets/watchbuddy-tv-${VERSION}-release.apk"
          done

          # Release AABs (when available)
          for aab in app-phone/build/outputs/bundle/release/*.aab; do
            [ -f "$aab" ] && cp "$aab" "release-assets/watchbuddy-phone-${VERSION}-release.aab"
          done
          for aab in app-tv/build/outputs/bundle/release/*.aab; do
            [ -f "$aab" ] && cp "$aab" "release-assets/watchbuddy-tv-${VERSION}-release.aab"
          done

          ls -lh release-assets/

      # -- Upload to GitHub Release ----------------------------------------
      - name: Upload release assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in release-assets/*.apk release-assets/*.aab; do
            [ -f "$file" ] && gh release upload "${TAG}" "$file" --clobber
          done

      # -- Download-Links in Release-Notes ergaenzen -----------------------
      - name: Update Release Notes with download links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          DOWNLOADS="---"
          DOWNLOADS="${DOWNLOADS}\n\n## Downloads\n"
          DOWNLOADS="${DOWNLOADS}\n| Asset | Link |"
          DOWNLOADS="${DOWNLOADS}\n|-------|------|"

          if [ -f "release-assets/watchbuddy-phone-${VERSION}-debug.apk" ]; then
            DOWNLOADS="${DOWNLOADS}\n| Phone (debug) | [watchbuddy-phone-${VERSION}-debug.apk](${BASE}/watchbuddy-phone-${VERSION}-debug.apk) |"
          fi
          if [ -f "release-assets/watchbuddy-tv-${VERSION}-debug.apk" ]; then
            DOWNLOADS="${DOWNLOADS}\n| TV (debug) | [watchbuddy-tv-${VERSION}-debug.apk](${BASE}/watchbuddy-tv-${VERSION}-debug.apk) |"
          fi
          if [ -f "release-assets/watchbuddy-phone-${VERSION}-release.apk" ]; then
            DOWNLOADS="${DOWNLOADS}\n| Phone (signed APK) | [watchbuddy-phone-${VERSION}-release.apk](${BASE}/watchbuddy-phone-${VERSION}-release.apk) |"
          fi
          if [ -f "release-assets/watchbuddy-tv-${VERSION}-release.apk" ]; then
            DOWNLOADS="${DOWNLOADS}\n| TV (signed APK) | [watchbuddy-tv-${VERSION}-release.apk](${BASE}/watchbuddy-tv-${VERSION}-release.apk) |"
          fi

          # Bestehende Notes holen und Download-Sektion anhaengen
          EXISTING=$(gh release view "${TAG}" --json body -q .body)
          UPDATED=$(printf "%s\n\n%b" "$EXISTING" "$DOWNLOADS")
          gh release edit "${TAG}" --notes "$UPDATED"

      # -- Extract changelog for Play Store --------------------------------
      - name: Generate Play Store changelog
        env:
          RELEASE_BODY: ${{ needs.release-please.outputs.body }}
        run: |
          # Strip markdown formatting for plain-text Play Store listing
          NOTES=$(echo "$RELEASE_BODY" | sed -E \
            -e 's/^\*\*([^*]+)\*\*/\1/g' \
            -e 's/\*\*//g' \
            -e 's/\[#[0-9]+\]\([^)]*\)//g' \
            -e 's/\[([^]]*)\]\([^)]*\)/\1/g' \
            -e 's/\([0-9a-f]{7}\)//g' \
            -e 's/, *closes *//g' \
            -e 's/[[:space:]]*$//g')

          # Trim leading/trailing blank lines
          NOTES=$(echo "$NOTES" | sed '/./,$!d' | sed -e :a -e '/^[[:space:]]*$/{ $d; N; ba; }')

          # Play Store limits "What's New" to 500 characters
          if [ ${#NOTES} -gt 500 ]; then
            NOTES="${NOTES:0:497}..."
          fi

          # Fail fast on an empty changelog — refuse to upload blank Play Store notes
          if [ -z "${NOTES//[[:space:]]/}" ]; then
            echo "::error::Release body is empty after markdown stripping — refusing to upload blank Play Store notes."
            exit 1
          fi

          # Write locale files — all locales get the same English text
          # (matches supported languages: EN, DE, FR, ES). Filenames must use the
          # `whatsnew-<locale>` convention expected by r0adkll/upload-google-play.
          mkdir -p whatsnew
          for LOCALE in en-US de-DE fr-FR es-ES; do
            echo "$NOTES" > "whatsnew/whatsnew-${LOCALE}"
          done

          echo "--- Play Store changelog (en-US) ---"
          cat whatsnew/whatsnew-en-US
          echo "--- ${#NOTES} characters ---"
          echo "--- files in whatsnew/ ---"
          ls -la whatsnew/

      # -- Determine Play Store release status ------------------------------
      - name: Determine Play Store release status
        id: play-status
        run: |
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          if [ "$MAJOR" -ge 1 ]; then
            echo "status=completed" >> "$GITHUB_OUTPUT"
          else
            echo "status=draft" >> "$GITHUB_OUTPUT"
          fi
          echo "release-name=${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"

      # -- Publish to Google Play Store ------------------------------------
      - name: Upload to Google Play Store
        if: steps.keystore.outputs.available == 'true' && steps.play-store.outputs.available == 'true'
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.justb81.watchbuddy
          releaseFiles: release-assets/*-release.aab
          track: internal
          status: ${{ steps.play-status.outputs.status }}
          releaseName: ${{ steps.play-status.outputs.release-name }}
          whatsNewDirectory: whatsnew

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: watchbuddy-release-${{ needs.release-please.outputs.version }}
          path: |
            release-assets/*.apk
            release-assets/*.aab

  update-stable:
    name: Update stable branch
    needs: [release-please, build-release]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fast-forward stable branch to release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ needs.release-please.outputs.tag_name }}"
          git checkout -B stable "$TAG"
          git push origin stable --force
