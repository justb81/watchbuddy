services:
  watchbuddy-backend:
    build: .
    container_name: watchbuddy-token-proxy
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TRAKT_CLIENT_ID
      - TRAKT_CLIENT_SECRET
      - PORT
      - DEBUG_MODE
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
